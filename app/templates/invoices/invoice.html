<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @page {
            size: A4;
            margin: 12mm 14mm;
        }

        body {
            font-family: 'Urbanist', 'Helvetica Neue', Arial, sans-serif;
            font-size: 11px;
            color: #1a1a1a;
            background: #ffffff;
            line-height: 1.5;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #e8edf2;
            padding: 32px 36px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .logo-block {}

        .logo {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #1a1a1a;
            text-transform: uppercase;
        }

        .logo-icon {
            color: #4a9fd4;
            font-size: 20px;
            font-weight: 400;
        }

        .invoice-date {
            font-size: 10.5px;
            color: #444;
        }

        .invoice-date span {
            font-weight: 500;
            margin-right: 6px;
        }

        .meta-right {
            text-align: right;
        }

        .meta-table {
            border-collapse: collapse;
        }

        .meta-table td {
            padding: 1px 0;
            font-size: 10.5px;
        }

        .meta-table td:first-child {
            color: #555;
            padding-right: 16px;
            text-align: left;
        }

        .meta-table td:last-child {
            color: #1a1a1a;
            font-weight: 500;
            text-align: right;
        }

        .invoice-number {
            color: #4a9fd4 !important;
            font-weight: 600 !important;
        }

        .divider {
            border: none;
            border-top: 1px solid #e0e7ef;
            margin: 18px 0;
        }

        .section-title {
            font-size: 10px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 0;
        }

        .items-table thead tr {
            background-color: #00AEEF33;
        }

        .items-table thead th {
            padding: 9px 14px;
            font-size: 10.5px;
            font-weight: 600;
            color: #1a1a1a;
            text-align: left;
        }

        .items-table thead th:not(:first-child) {
            text-align: center;
        }

        .items-table thead th:last-child {
            text-align: right;
        }

        .items-table tbody tr {
            border-bottom: 1px solid #f0f4f8;
        }

        .items-table tbody tr:nth-child(odd) {
            background: #ffffff;
        }

        .items-table tbody tr:nth-child(even) {
            background: #EAEAEA;
        }

        .items-table tbody td {
            padding: 9px 14px;
            font-size: 10.5px;
            color: #2a2a2a;
            text-align: center;
        }

        .items-table tbody td:first-child {
            text-align: left;
        }

        .items-table tbody td:last-child {
            text-align: right;
        }

        .totals-block {
            display: flex;
            justify-content: flex-end;
            margin-top: 14px;
            margin-bottom: 4px;
        }

        .totals-table {
            border-collapse: collapse;
            min-width: 240px;
        }

        .totals-table tr td {
            padding: 3px 0;
            font-size: 10.5px;
        }

        .totals-table tr td:first-child {
            color: #555;
            text-align: right;
            padding-right: 24px;
        }

        .totals-table tr td:last-child {
            color: #1a1a1a;
            text-align: right;
            font-weight: 500;
            min-width: 90px;
        }

        .totals-table .total-row td {
            font-size: 12px;
            font-weight: 700;
            color: #1a1a1a;
            padding-top: 6px;
        }

        .totals-divider {
            border: none;
            border-top: 1px solid #e0e7ef;
            margin: 10px 0 6px 0;
        }

        .meter-section {
            margin-top: 20px;
        }

        .meter-table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #e0e7ef;
            border-radius: 10px;
            overflow: hidden;
        }

        .meter-table thead tr {
            background: #F2F2F2;
        }

        .meter-table thead th {
            padding: 9px 14px;
            font-size: 10.5px;
            font-weight: 600;
            color: #1a1a1a;
            text-align: left;
        }

        .meter-table thead th:not(:first-child) {
            text-align: center;
        }

        .meter-table thead th:last-child {
            text-align: right;
        }

        .meter-table tbody tr {
            border-top: 1px solid #edf1f6;
        }

        .meter-table tbody tr.period-row td {
            padding: 7px 14px;
            font-size: 10px;
            color: #777;
            text-align: center;
            background: #fafbfc;
        }

        .meter-table tbody tr:nth-child(odd):not(.period-row) {
            background: #ffffff;
        }

        .meter-table tbody tr:nth-child(even):not(.period-row) {
            background: #EAEAEA99;
        }

        .meter-table tbody td {
            padding: 9px 14px;
            font-size: 10.5px;
            color: #2a2a2a;
            text-align: center;
        }

        .meter-table tbody td:first-child {
            text-align: left;
        }

        .meter-table tbody td:last-child {
            text-align: right;
        }

        .footer {
            margin-top: 28px;
            text-align: center;
            font-size: 9px;
            color: #aaa;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <div class="logo-block">
            <div class="logo">
                <img src="{{ base64_logo }}" alt="Switch" style="height: 32px;" />
            </div>
            <div class="invoice-date">
                <span>Invoice Date:</span>
                {{ period_start_at }} – {{ period_end_at }}
            </div>
        </div>

        <div class="meta-right">
            <table class="meta-table">
                <tr>
                    <td>Customer:</td>
                    <td>{{ client_name }}</td>
                </tr>
                <tr>
                    <td>Site:</td>
                    <td>{{ site_name }}</td>
                </tr>
                <tr>
                    <td>Invoice Number:</td>
                    <td class="invoice-number">{{ invoice_ref }}</td>
                </tr>
            </table>
        </div>
    </div>

    <hr class="divider" />

    {% include "partials/ppa_line_items.html" %}

    <hr class="divider" />

    {% include "partials/meter_data.html" %}

    {% include "partials/footer.html" %}

</div>
</body>
</html>
