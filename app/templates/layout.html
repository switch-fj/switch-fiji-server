<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}{% endblock %}</title>
  </head>
  <body style="background-color: #f4f4f4;">
    <center style="width: 100%; max-width: 600px; table-layout: fixed; background-color: #fff; padding-bottom: 40px; margin: auto;">
      <table style="width: 100%; border-spacing: 0; max-width: 95%; font-family: sans-serif; font-size: 14px; color: {{text_primary}}" width="100%">
        <!-- Logo Section -->
        <tr>
            <td>
                {% include 'header.html' %}
            </td>
        </tr>
        
        <!-- Content Section -->
        <tr>
            <td>
              {% block content %}{% endblock %}
            </td>
        </tr>

        <!-- Footer Section -->
        <tr>
          <td>
            {% include 'footer.html' %}
          </td>
        </tr>
    </table>
   </center>
  </body>
</html>
