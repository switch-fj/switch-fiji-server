{% macro token(text, bg_color=primary) %}
  <p
    style="width: 100px; margin: 0px auto; max-width: 280px;  text-align: center; color: {{bg_color}}; font-size: xx-large; padding: 12px 24px; text-decoration: none; border-radius: 8px; display: inline-block; font-weight: bold;"
  >
    {{ text }}
</p>
{% endmacro %}
