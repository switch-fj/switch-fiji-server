{% macro button(href, text, bg_color=primary) %}
  <a href="{{ href }}"
     style="width: 100%; margin: 0px auto; max-width: 400px;  text-align: center; color: #ffffff; padding: 12px 24px; text-decoration: none; border-radius: 8px; display: inline-block; font-weight: bold; background-color: {{ bg_color }}"
  >
    {{ text }}
  </a>
{% endmacro %}
